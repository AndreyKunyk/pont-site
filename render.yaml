services:
  - type: web
    name: kunik-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: YOOKASSA_SHOP_ID
        sync: false
      - key: YOOKASSA_SECRET_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        sync: false
      - key: INVENTORY_DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        value: https://pont.website
      - key: ALLOWED_ORIGINS
        value: https://pont.website
